spring.datasource.url=jdbc:postgresql://etax-pgcluster-primary.etax-app.svc:5432/etaxdb?sslmode=require&sslrootcert=/dev/null
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:etaxuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
logging.level.lk.gov.ird.etax=INFO
